# Experimental matrix.
#
# Each phase expands as the cartesian product of its `heads`, `datasets`,
# `n_demos`, `seeds`, and `encoders` lists. The matrix runner checks each
# cell's run_id against the artifact root and skips already-completed
# work, so re-running after a Colab disconnect is idempotent.
#
# Phases A-F follow the strategy doc; they are experimental-design
# identifiers, not schedule identifiers.

phases:
  # Phase A: reproduce the legacy autoresearch baseline on RoboMimic Lift PH
  # low-dim under the new harness. Uses the same z-score action normalization
  # as src/data.py so val_mse can be compared directly to configs/results.json.
  # kNN is a no-train baseline; its val_mse equals the legacy "nearest_neighbor"
  # column of results.json.
  - id: A
    heads: [direct_mlp, raid, knn]
    datasets: [robomimic_lift_ph_low_dim]
    n_demos: [25, 50, 100, 200]
    seeds: [42, 1337, 2024]
    epochs: 50
    batch_size: 256
    action_norm: zscore

  # Phase B: cross-dataset state-only IDM on the four RoboMimic tasks
  # (PH+MH). The MixedIDMDataset wrapper concatenates the children. Note
  # that RoboMimic ``object`` width varies per task, so this phase only
  # runs cleanly when all tasks happen to share the same low-dim state
  # width; otherwise the runner errors with a clear message and you
  # should use the image-feature variant from phase C instead.
  - id: B
    heads: [direct_mlp, transformer, diffusion]
    datasets:
      - mixed_robomimic_lowdim_full
      - mixed_robomimic_lowdim_subset25
    n_demos: [200]
    seeds: [42, 1337, 2024]
    epochs: 50
    action_norm: zscore

  # Phase C: image-feature IDM (the new core). DINOv2 CLS features
  # cached by ``v2.features``. RAID uses retrieval over the same
  # cached features.
  - id: C
    heads: [direct_mlp, raid, transformer, diffusion]
    datasets:
      - robomimic_square_ph_image
      # libero_spatial pending RLDS schema verification; see
      # v2/datasets/cached.py for the placeholder.
    n_demos: [50, 200]
    seeds: [42, 1337, 2024]
    encoders: [dinov2]
    epochs: 50
    action_norm: q01_q99

  # Phase D: encoder ablation. DINOv2 vs Theia on the best-of-C head.
  - id: D
    heads: [transformer]
    datasets: [robomimic_square_ph_image]
    n_demos: [200]
    seeds: [42, 1337, 2024]
    encoders: [theia]
    epochs: 50
    action_norm: q01_q99

  # Phase E: multi-task retrieval test on LIBERO-Goal pooled across tasks.
  # Pending the LIBERO RLDS schema fix in v2/datasets/cached.py.
  # - id: E
  #   heads: [direct_mlp, raid]
  #   datasets: [libero_goal]
  #   n_demos: [50]
  #   seeds: [42, 1337, 2024]
  #   encoders: [dinov2]
  #   epochs: 50
  #   action_norm: q01_q99

  # Phase F: optional GR00T-N1.5 LoRA stretch goal. Out of scope by
  # default; uncomment once the loader has been wired against
  # github.com/NVIDIA/Isaac-GR00T scripts/gr00t_finetune.py.
  # - id: F
  #   heads: [groot_n15_lora]
  #   datasets: [libero_spatial]
  #   n_demos: [200]
  #   seeds: [42]
  #   encoders: [native]
  #   epochs: 30
